services:
  redis:
    image: redis:7-alpine
    container_name: undercover_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  undercover_bot:
    build: .
    container_name: undercover_bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${WEBHOOK_PORT:-8787}:${WEBHOOK_PORT:-8787}"
    depends_on:
      - redis
    volumes:
      - .:/app
    networks:
      - default
      - dice_shared

volumes:
  redis_data:
    external: true
    name: undercover_bot_redis_data

networks:
  dice_shared:
    external: true
    name: dice_bot_default
